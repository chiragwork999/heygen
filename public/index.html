<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Tech Shorts Studio</title>
    <style>
      :root {
        --bg:#070b18; --card:#111936; --accent:#5b8cff; --accent2:#7ef0ff; --text:#eaf0ff; --muted:#9fb2d9;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, Arial, sans-serif;
        background: radial-gradient(1200px 700px at 80% -10%, #22356d 0%, var(--bg) 40%);
        color: var(--text);
      }
      .container { max-width: 1040px; margin: 50px auto; padding: 0 20px; }
      .hero { display:flex; justify-content:space-between; align-items:flex-end; gap:20px; margin-bottom:20px; }
      .title { font-size: 2rem; font-weight:700; }
      .subtitle { color: var(--muted); }
      .panel {
        background: linear-gradient(160deg, rgba(126,240,255,.08), rgba(91,140,255,.07));
        border:1px solid rgba(255,255,255,.12);
        border-radius:16px;
        padding:20px;
        box-shadow:0 20px 50px rgba(0,0,0,.35);
      }
      .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
      label { font-size:.9rem; color:var(--muted); display:block; margin-bottom:8px; }
      input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid #324372; background:#0c1430; color:var(--text); }
      button {
        margin-top:14px; width:100%; padding:12px 16px; border:0; border-radius:12px;
        background:linear-gradient(90deg, var(--accent), var(--accent2)); color:#081126; font-weight:700; cursor:pointer;
      }
      pre { background:#070d21; border:1px solid #283962; border-radius:12px; padding:14px; min-height:200px; overflow:auto; color:#c8d8ff; }
      video { width:100%; border-radius:12px; border:1px solid #2d3d66; margin-top:10px; }
      @media (max-width:860px){ .grid{grid-template-columns:1fr;} }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="hero">
        <div>
          <div class="title">Auto Tech Shorts Studio</div>
          <div class="subtitle">HeyGen-powered realistic avatar videos with daily fresh tech updates.</div>
        </div>
      </div>

      <div class="panel grid">
        <div>
          <label>Daily face image path (for metadata/logging)</label>
          <input id="img" placeholder="public/uploads/today.jpg" />
          <button id="generate">Generate Professional Short</button>
        </div>
        <div>
          <label>Generation result</label>
          <pre id="result">Ready.</pre>
        </div>
      </div>

      <div class="panel" style="margin-top:16px">
        <label>Video Preview</label>
        <video id="preview" controls></video>
      </div>
    </div>

    <script>
      const btn = document.getElementById('generate');
      const img = document.getElementById('img');
      const result = document.getElementById('result');
      const preview = document.getElementById('preview');

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        result.textContent = 'Generating with HeyGen... this can take 30-120 seconds.';
        preview.removeAttribute('src');

        try {
          const res = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ imagePath: img.value || 'public/uploads/today.jpg' })
          });
          const data = await res.json();
          result.textContent = JSON.stringify(data, null, 2);
          const url = data?.result?.videoUrl;
          if (url) {
            preview.src = url;
            preview.play().catch(() => {});
          }
        } catch (e) {
          result.textContent = e.message;
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
